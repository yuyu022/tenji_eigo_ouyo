// 「英語セグメント」を作るときに、必要なら日本語セグメントに差し替える
function speakTokenSmart(text){
  const key = String(text || "").trim().toLowerCase();
  if (SPECIAL_TTS_JA[key]) return { lang:"ja", text: SPECIAL_TTS_JA[key] };
  return { lang:"en", text: String(text || "") };
}

/* =========================================================
  日本語を聞きやすく整形
========================================================= */
function normalizeJapaneseForSpeech(text){
  if (!text) return text;

  text = text.replace(/^英語点字とは。/g, "では、英語点字について説明しますね。");
  text = text.replace(/結論から言うね。/g, "まず、結論から言います。");

  text = text.replace(/例。/g, "たとえば、");
  text = text.replace(/。dad。face。/gi, "。たとえば、dad。つぎに、face。");

  text = text.replace(/1語/g, "いちご");
  text = text.replace(/2語/g, "にご");
  text = text.replace(/3語/g, "さんご");
  text = text.replace(/1マス/g, "いちます");
  text = text.replace(/2マス/g, "にます");

  text = text.replace(/。次。/g, "。つぎです。");
  text = text.replace(/次。/g, "つぎです。");

  return text;
}

/* =========================================================
  日本語セグメントをほどよく結合（抑揚安定）
========================================================= */
function compactJapaneseSegments(seq){
  const out = [];
  let buf = "";
  const flush = ()=>{
    const t = buf.trim();
    if (t) out.push({lang:"ja", text:t});
    buf = "";
  };
  for (const s of seq){
    if (s.lang === "ja"){
      buf += (buf ? " " : "") + s.text;
      if (buf.length > 70 || /。$/.test(s.text)) flush();
    } else {
      flush();
      out.push(s);
    }
  }
  flush();
  return out;
}

/* =========================================================
  点（ドット）読み上げユーティリティ
========================================================= */
function dotsToJa(dots){
  const uniq = [...new Set(dots)].sort((a,b)=>a-b);
  if (uniq.length===0) return "点なし";
  if (uniq.length===1) return `${uniq[0]}の点`;
  if (uniq.length===2) return `${uniq[0]}と${uniq[1]}の点`;
  return `${uniq.slice(0,-1).join("、")}、${uniq[uniq.length-1]}の点`;
}
function cellToJa(cells){
  if (!cells || cells.length===0) return "点の情報はありません";
  if (cells.length===1) return dotsToJa(cells[0]);
  const parts = cells.map((d,i)=>`${i+1}マス目は${dotsToJa(d)}`);
  return `${cells.length}マスで、${parts.join("。")}`;
}

/* =========================================================
  音声（Web Speech API）
========================================================= */
let voicesCache = [];
function loadVoices(){ voicesCache = speechSynthesis.getVoices(); }
if ("speechSynthesis" in window) {
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}
function pickVoice(lang){
  const lower = lang.toLowerCase();
  return voicesCache.find(v => (v.lang||"").toLowerCase().startsWith(lower)) || null;
}
function speakOne({lang,text}){
  return new Promise(resolve=>{
    if (!("speechSynthesis" in window)) return resolve();

    const finalText = (lang === "ja") ? normalizeJapaneseForSpeech(text) : text;

    const u = new SpeechSynthesisUtterance(finalText);
    u.lang = (lang==="en") ? PARAMS.EN_LANG : PARAMS.JA_LANG;
    u.rate = (lang==="en") ? PARAMS.EN_RATE : PARAMS.JA_RATE;
    u.pitch = (lang==="en") ? PARAMS.EN_PITCH : PARAMS.JA_PITCH;
    u.volume = PARAMS.VOLUME;

    const v = pickVoice(u.lang); if (v) u.voice = v;
    u.onend = ()=>setTimeout(resolve, PARAMS.GAP_MS);
    u.onerror=()=>setTimeout(resolve, PARAMS.GAP_MS);
    speechSynthesis.speak(u);
  });
}
async function speakSequence(seq, token){
  for (const item of seq){
    if (token.cancelled) return;
    await speakOne(item);
  }
}

    seq.push({lang:"ja", text:"アルファベットと大文字。まずアルファベット。次に大文字のルール。大文字は、前に大文字記号を付けて表します。"});
    if (PARAMS.READ_TABLES_FULLY){
      seq.push(...buildExplainAlphabet());
      seq.push(...buildExplainCapitals());
    } else {
      seq.push({lang:"ja", text:`大文字符は${cellToJa(UEB.capPrefix)}。大文字単語符は${cellToJa(UEB.capWord)}。3語以上の大文字は大文字パッセージ符で始め、最後は大文字終止符で終えます。`});
    }
  }
  else if (id==="4"){
    seq.push({lang:"ja", text:"数字。まず数符。数符のあとに数字を書きます。数字の形は a から j と同じ。"});
    if (PARAMS.READ_TABLES_FULLY) seq.push(...buildExplainNumbers());
  }
  else if (id==="5"){
    seq.push({lang:"ja", text:"句読符。位置と順番は墨字どおり。英語点字のピリオドの後は1マスあけ。段落の始めは2マス下げ。"});
    if (PARAMS.READ_TABLES_FULLY) seq.push(...buildExplainPunctuation());
  }
  else if (id==="6"){
    seq.push(...buildExplainContractionIntro());
    seq.push({lang:"ja", text:"次の6-1から6-7で、表に沿って段階ごとに全部学べます。"});
  }
  else if (id==="6-1"){ seq.push(...buildExplainStage1()); }
  else if (id==="6-2"){ seq.push(...buildExplainStage2()); }
  else if (id==="6-3"){ seq.push(...buildExplainStage3()); }
  else if (id==="6-4"){ seq.push(...buildExplainShortforms(TABLES.shortform1, "表8の5の8。段階4")); }
  else if (id==="6-5"){ seq.push(...buildExplainShortforms(TABLES.shortform2, "表8の5の9。段階5")); }
  else if (id==="6-6"){ seq.push(...buildExplainLowerWordsigns()); }
  else if (id==="6-7"){ seq.push(...buildExplainLowerGroupsigns()); }
  else if (id==="7"){ seq.push(...buildExplainItalics()); }
  else if (id==="8"){ seq.push(...buildExplainCurrency()); }
  else if (id==="9"){ seq.push(...buildExplainModifiers()); }
  else if (id==="10"){ seq.push(...buildExplainGaiji()); }
  else if (id==="11"){ seq.push(...buildExplainPhonetic()); }
  else if (id==="12"){ seq.push(...buildExplainTrends()); }
  else { seq.push({lang:"ja", text:"この項目は準備中です。"}); }
  return seq;
}

/* =========================================================
  UIロジック（★確認なし：1回押したら即開始）
========================================================= */
const statusEl = document.getElementById("status");
const ariaLive = document.getElementById("ariaLive");
let selectedId = null;
let playingId = null;
let currentToken = {cancelled:false};

function setStatus(msg){
  statusEl.textContent = "状態： " + msg;
  ariaLive.textContent = msg;
}
function stopSpeech(){
  try{ speechSynthesis.cancel(); }catch(e){}
  currentToken.cancelled = true;
  currentToken = {cancelled:false};
  playingId = null;
}
function clearSelection(){
  selectedId = null;
  document.querySelectorAll(".btn.selected").forEach(b=>b.classList.remove("selected"));
}
function selectButton(btn){
  clearSelection();
  btn.classList.add("selected");
  selectedId = btn.dataset.id;
}

async function startLesson(id, name){
  playingId = id;
  setStatus(`${name} の説明中`);

  const seq = [
    {lang:"ja", text:`${name}${PARAMS.START_PROMPT}`},
    ...buildLesson(id)
  ];
  const finalSeq = compactJapaneseSegments(seq);
  await speakSequence(finalSeq, currentToken);

  if (!currentToken.cancelled && playingId===id){
    playingId = null;
    setStatus("待機中");
  }
}

async function handleButton(btn){
  const id = btn.dataset.id;
  const name = btn.textContent.trim();

  // 説明中に同じボタン → 停止（トグル）
  if (playingId === id){
    stopSpeech();
    setStatus(`${name} を停止`);
    await speakSequence([{lang:"ja", text:`${name}${PARAMS.STOP_PROMPT}`}], currentToken);
    return;
  }

  // 別ボタンなら：いま鳴ってる音声を止めて、そのまま切り替え
  if (playingId && playingId !== id) stopSpeech();

  // 選択状態を更新
  selectButton(btn);

  // ★1回押したら即開始
  await startLesson(id, name);
}

document.querySelectorAll(".btn").forEach(btn=>{
  btn.addEventListener("click",(e)=>{
    e.stopPropagation();
    handleButton(btn);
  });
});

// ボタン以外を押したら停止＋選択解除
document.addEventListener("click", async (e)=>{
  const isBtn = e.target?.classList?.contains("btn");
  if (isBtn) return;

  if (playingId){
    stopSpeech();
  }
  if (selectedId !== null){
    clearSelection();
    setStatus("停止して選択解除");
    await speakSequence([{lang:"ja", text:PARAMS.DESELECT_PROMPT}], currentToken);
  }
});

setStatus("待機中");
</script>
